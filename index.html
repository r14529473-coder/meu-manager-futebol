<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Meu Football Manager</title>
    <style>
        body { font-family: sans-serif; text-align: center; background-color: #020617; color: white; padding: 20px; }
        h1 { color: #3b82f6; }
        #placar { font-size: 40px; margin: 20px; font-weight: bold; }
        button { background: #3b82f6; color: white; border: none; padding: 15px 30px; font-size: 18px; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Global Football Manager 2026</h1>
    <p>Simulador de Partida:</p>
    <div id="placar">0 - 0</div>
    <button onclick="jogar()">SIMULAR PARTIDA</button>

    <script>
        function jogar() {
            let golsCasa = Math.floor(Math.random() * 5);
            let golsFora = Math.floor(Math.random() * 5);
            document.getElementById('placar').innerHTML = golsCasa + " - " + golsFora;
        }
    </script>
</body>
</html>
