<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Global Football Manager PRO</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; text-align: center; padding: 10px; }
        .card { background: #1e293b; padding: 15px; border-radius: 15px; margin: 10px; }
        input, select, button { padding: 12px; margin: 5px; border-radius: 8px; border: none; font-size: 16px; width: 90%; }
        button { background: #3b82f6; color: white; cursor: pointer; }
        .admin { background: #4c1d95; border: 2px dashed #8b5cf6; padding: 10px; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="setup" class="card">
        <h1>Global Football Manager 2026</h1>
        <select id="selectTime">
            <option value="Flamengo">Flamengo</option>
            <option value="Palmeiras">Palmeiras</option>
            <option value="Real Madrid">Real Madrid</option>
            <option value="Man City">Manchester City</option>
        </select>
        <button onclick="iniciar()">CONFIRMAR TIME</button>
    </div>

    <div id="jogo" class="card" style="display:none;">
        <h2 id="timeDisplay"></h2>
        <p>Saldo: <span id="dinheiro">1000</span> Milhões</p>
        <div style="font-size: 30px; font-weight: bold; color: #fbbf24;" id="placar">0 - 0</div>
        <button onclick="jogar()" style="background:#22c55e;">JOGAR PARTIDA</button>

        <div class="admin">
            <h3>⚙️ Painel do Admin</h3>
            <input type="number" id="inputDinheiro" placeholder="Novo Saldo">
            <button onclick="alterarSaldo()" style="background:#8b5cf6;">ATUALIZAR SALDO</button>
            <button onclick="resetar()" style="background:#ef4444;">RESETAR TUDO</button>
        </div>
    </div>

    <script>
        window.onload = function() {
            if(localStorage.getItem('nomeTime')) {
                atualizarInterface();
                document.getElementById('setup').style.display = 'none';
                document.getElementById('jogo').style.display = 'block';
            }
        };

        function atualizarInterface() {
            document.getElementById('timeDisplay').innerText = localStorage.getItem('nomeTime');
            document.getElementById('dinheiro').innerText = localStorage.getItem('dinheiro');
        }

        function iniciar() {
            let nome = document.getElementById('selectTime').value;
            localStorage.setItem('nomeTime', nome);
            localStorage.setItem('dinheiro', 1000);
            location.reload();
        }

        function jogar() {
            let g1 = Math.floor(Math.random() * 4);
            let g2 = Math.floor(Math.random() * 4);
            document.getElementById('placar').innerText = g1 + " - " + g2;
            if(g1 > g2) {
                let din = parseInt(localStorage.getItem('dinheiro')) + 50;
                localStorage.setItem('dinheiro', din);
                atualizarInterface();
            }
        }

        // FUNÇÕES DO ADMIN
        function alterarSaldo() {
            let novoValor = document.getElementById('inputDinheiro').value;
            if(novoValor) {
                localStorage.setItem('dinheiro', novoValor);
                atualizarInterface();
            }
        }

        function resetar() {
            localStorage.clear();
            location.reload();
        }
    </script>
</body>
</html>
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Global Football Manager PRO</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; text-align: center; padding: 10px; }
        .card { background: #1e293b; padding: 20px; border-radius: 15px; margin: 10px; }
        button { background: #3b82f6; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; margin-top: 10px; cursor: pointer; }
        .placar { font-size: 32px; font-weight: bold; color: #fbbf24; margin: 10px 0; }
    </style>
</head>
<body>
    <div id="setup" class="card">
        <h1>Global Football Manager 2026</h1>
        <input type="text" id="nomeTime" placeholder="Nome do seu Time" style="padding:10px; width:80%; border-radius:5px; border:none;">
        <button onclick="iniciar()">INICIAR CARREIRA</button>
    </div>

    <div id="jogo" class="card" style="display:none;">
        <h2 id="timeDisplay"></h2>
        <p>Saldo: <span id="dinheiro">1000</span> Milhões</p>
        <div class="placar" id="placar">0 - 0</div>
        <button onclick="jogar()">SIMULAR PARTIDA</button>
        <button onclick="resetar()" style="background:#ef4444; font-size:12px;">RESETAR JOGO</button>
    </div>

    <script>
        let dinheiro = parseInt(localStorage.getItem('dinheiro')) || 1000;
        let nome = localStorage.getItem('nomeTime') || "";

        window.onload = function() {
            if(nome) {
                document.getElementById('timeDisplay').innerText = nome;
                document.getElementById('dinheiro').innerText = dinheiro;
                document.getElementById('setup').style.display = 'none';
                document.getElementById('jogo').style.display = 'block';
            }
        };

        function iniciar() {
            nome = document.getElementById('nomeTime').value;
            if(!nome) return alert("Dê um nome ao seu time!");
            localStorage.setItem('nomeTime', nome);
            document.getElementById('timeDisplay').innerText = nome;
            document.getElementById('setup').style.display = 'none';
            document.getElementById('jogo').style.display = 'block';
        }

        function jogar() {
            let g1 = Math.floor(Math.random() * 4);
            let g2 = Math.floor(Math.random() * 4);
            document.getElementById('placar').innerText = g1 + " - " + g2;
            if(g1 > g2) {
                dinheiro += 50;
                localStorage.setItem('dinheiro', dinheiro);
                document.getElementById('dinheiro').innerText = dinheiro;
            }
        }

        function resetar() {
            localStorage.clear();
            location.reload();
        }
    </script>
</body>
</html>
